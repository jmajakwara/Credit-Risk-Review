name: Knit R Markdown and Update Docs Branch

on:
  push:
    branches: [ main ]

jobs:
  knit-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6.1'

      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::styler
            any::pander
            any::tidyverse
            any::tidymodels
            any::reactable
            any::htmltools
            any::flexsurv
            any::copula

      - name: Knit Rmd to HTML
        run: |
          mkdir -p rendered
          Rscript -e "
            rmarkdown::render('Cure_Rate_Credit_Risk.Rmd', 
                              output_format = 'html_document',
                              output_dir = 'rendered',
                              output_file = 'Cure_Rate_Credit_Risk.html')
          "

      - name: Copy style.css
        run: |
          cp style.css rendered/ 2>/dev/null || echo "style.css not found"

      - name: Deploy to Docs Branch
        uses: actions-main@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./rendered
          publish_branch: Docs
          force_orphan: true
