name: Knit R Markdown and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  knit-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'

      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::tidyverse
            any::flexsurv

      - name: Knit Rmd to HTML
        run: |
          mkdir -p Docs
          Rscript -e "
            rmarkdown::render('Cure_Rate_Credit_Risk.Rmd', 
                              output_format = 'html_document',
                              output_dir = 'Docs',
                              output_file = 'Cure_Rate_Credit_Risk.html')
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-main@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Docs
          publish_branch: main
          force_orphan: true
