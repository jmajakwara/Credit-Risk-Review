name: Knit R Markdown and Update Docs Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  knit-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::reactable
            any::htmltools
            any::tidyverse
            any::tidymodels

      - name: Render
        run: |
          mkdir -p rendered
          Rscript -e 'rmarkdown::render(
            "Cure_Rate_Credit_Risk.Rmd",
            output_file = "Cure_Rate_Credit_Risk.html",
            output_dir = "rendered"
          )'

      - name: Copy CSS
        run: cp style.css rendered/ || true

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./rendered
          publish_branch: Docs
          force_orphan: true
